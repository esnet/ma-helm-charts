{{- if and .Values.config.gateway.enabled (eq .Values.config.gateway.type "gke") }}
{{- $bootstrapImage := .Values.config.gateway.bootstrap.image | default "alpine:3" }}
---
# Bootstrap ServiceAccount – runs as an ArgoCD PreSync hook to break the
# GKE Gateway / cert-manager chicken-and-egg race condition.
# The Job creates a self-signed TLS Secret before the main sync so the
# GKE Gateway can provision.  cert-manager replaces it with the real
# Let's Encrypt cert once the Gateway is live and the HTTP01 challenge
# can be served.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cert-bootstrap-sa
  namespace: {{ .Values.config.namespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cert-bootstrap-role
  namespace: {{ .Values.config.namespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cert-bootstrap-rb
  namespace: {{ .Values.config.namespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cert-bootstrap-role
subjects:
  - kind: ServiceAccount
    name: cert-bootstrap-sa
    namespace: {{ .Values.config.namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: cert-bootstrap
  namespace: {{ .Values.config.namespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-wave: "2"
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: cert-bootstrap-sa
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: {{ $bootstrapImage }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e

              # Install openssl (curl is included in alpine base)
              apk add --no-cache openssl curl 2>/dev/null

              NAMESPACE="{{ .Values.config.namespace }}"
              SECRET_NAME="{{ .Values.config.certificate.name }}"
              API_SERVER="https://kubernetes.default.svc"
              TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              CA_CERT="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"

              echo "Checking if TLS Secret '${SECRET_NAME}' already exists..."

              HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                --cacert "${CA_CERT}" \
                -H "Authorization: Bearer ${TOKEN}" \
                "${API_SERVER}/api/v1/namespaces/${NAMESPACE}/secrets/${SECRET_NAME}")

              if [ "${HTTP_STATUS}" = "200" ]; then
                echo "TLS Secret '${SECRET_NAME}' already exists – skipping bootstrap."
                exit 0
              fi

              echo "TLS Secret not found (HTTP ${HTTP_STATUS}). Generating self-signed bootstrap certificate..."

              # Self-signed cert valid for 2 days – only needs to keep the GKE
              # Gateway happy until cert-manager issues the real certificate.
              openssl req -x509 -newkey rsa:2048 \
                -keyout /tmp/tls.key \
                -out /tmp/tls.crt \
                -days 2 \
                -nodes \
                -subj "/CN={{ index .Values.config.domains 0 }}"

              TLS_CRT=$(base64 -w0 /tmp/tls.crt)
              TLS_KEY=$(base64 -w0 /tmp/tls.key)

              echo "Creating bootstrap TLS Secret via Kubernetes API..."

              RESPONSE_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
                --cacert "${CA_CERT}" \
                -X POST \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "Content-Type: application/json" \
                "${API_SERVER}/api/v1/namespaces/${NAMESPACE}/secrets" \
                -d "{
                  \"apiVersion\": \"v1\",
                  \"kind\": \"Secret\",
                  \"metadata\": {
                    \"name\": \"${SECRET_NAME}\",
                    \"namespace\": \"${NAMESPACE}\",
                    \"annotations\": {
                      \"cert-manager.io/bootstrap\": \"true\",
                      \"cert-manager.io/certificate-name\": \"${SECRET_NAME}\"
                    }
                  },
                  \"type\": \"kubernetes.io/tls\",
                  \"data\": {
                    \"tls.crt\": \"${TLS_CRT}\",
                    \"tls.key\": \"${TLS_KEY}\"
                  }
                }")

              if [ "${RESPONSE_STATUS}" = "201" ]; then
                echo "Bootstrap TLS Secret '${SECRET_NAME}' created successfully."
              else
                echo "ERROR: Failed to create Secret. HTTP Status: ${RESPONSE_STATUS}"
                cat /tmp/response.json
                exit 1
              fi
{{- end }}
