{{- if eq .Values.config.gateway.type "envoy" }}
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy
{{- if .Values.config.argocd_annotation }}
  annotations:
    argocd.argoproj.io/sync-wave: "-15"
{{- end }}
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: {{ .Values.config.gateway.proxy_name }}
    namespace: {{ .Values.config.gateway.envoy_system_namespace }}
{{- end }}
