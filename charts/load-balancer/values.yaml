config:
  argocd_annotation: true
  namespace: appNamespace
  email: esnet-seg-ma@lbl.gov
  domains:
    - 34.59.30.245.nip.io
  certificate:
    name: tls-cert
    issuer: letsencrypt-prod
    issuer_server: https://acme-v02.api.letsencrypt.org/directory
    ## If staging use:
    # issuer_server: https://acme-staging-v02.api.letsencrypt.org/directory
    # issuer: letsencrypt-staging (does not need to be update but helpful to avoid confusion)
    tlsPolicy:
      enabled: true
      name: gke-gateway-ssl-policy
      minVersion: "1.2"
      ciphers:
        - ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256
        - ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256
        - TLS_AES_128_GCM_SHA256
        - TLS_AES_256_GCM_SHA384
        - TLS_CHACHA20_POLY1305_SHA256
  gateway:
    enabled: true
    envoy_system_namespace: envoy-gateway-system
    name: external-http
    namespace_policy: All
    # type: gke
    # class_name: gke-l7-global-external-managed
    ## GKE bootstrap: a PreSync hook Job creates a self-signed TLS Secret before
    ## the main sync so the GKE Gateway can provision without waiting for
    ## cert-manager to complete the ACME HTTP01 challenge.
    ## cert-manager will replace the Secret with the real cert once the Gateway
    ## is live.  Override the image if your cluster cannot pull from Docker Hub.
    bootstrap:
      image: "alpine:3"
    ## envoy
    proxy_name: external-http-proxy
    type: envoy
    class_name: envoy
    ipv4:
      enabled: true
      address: 8.2.2.2
      address_type: NamedAddress
    ipv6:
      enabled: true
      address: "2600::"
      address_type: NamedAddress
    routes:
      - name: http
        port: 80
        protocol: HTTP
      - name: https
        port: 443
        protocol: HTTPS
        use_tls: true
        mode: Terminate
        include_cert: true

extraResources: []
