---
apiVersion: kafka.strimzi.io/{{ $.Values.config.operator.crd_version }}
kind: KafkaNodePool
metadata:
  name: controller
  labels:
    strimzi.io/cluster: {{ .Values.config.kafka.clusterName }}
    {{- include "kafka.componentLabels" (list . "controller") | nindent 4 }}
spec:
  replicas: {{ .Values.config.keeper.replicas }}
  storage:
    type: jbod
    volumes:
      {{- range .Values.config.keeper.storage.volumes }}
      - id: {{ .id }}
        type: {{ .type }}
        size: {{ .size }}
        {{- if .kraftMetadata }}
        kraftMetadata: {{ .kraftMetadata }}
        {{- end }}
        deleteClaim: {{ .deleteClaim }}
      {{- end }}
  resources:
    limits:
      cpu: {{ .Values.config.keeper.resources.limits.cpu | quote }}
      memory: {{ .Values.config.keeper.resources.limits.memory }}
    requests:
      cpu: {{ .Values.config.keeper.resources.requests.cpu | quote }}
      memory: {{ .Values.config.keeper.resources.requests.memory }}
  template:
    pod:
      terminationGracePeriodSeconds: {{ .Values.config.keeper.terminationGracePeriodSeconds }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              strimzi.io/cluster: {{ .Values.config.kafka.clusterName }}
              app.kubernetes.io/component: controller
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: strimzi.io/controller-name
                    operator: In
                    values:
                      - {{ .Values.config.kafka.clusterName }}-controller
              topologyKey: "kubernetes.io/hostname"
  roles:
    - controller
---
apiVersion: kafka.strimzi.io/{{ $.Values.config.operator.crd_version }}
kind: KafkaNodePool
metadata:
  name: {{ .Values.config.kafka.brokerPoolName }}
  labels:
    strimzi.io/cluster: {{ .Values.config.kafka.clusterName }}
    {{- include "kafka.componentLabels" (list . "broker") | nindent 4 }}
spec:
  roles:
    - broker
  replicas: {{ .Values.config.kafka.replicas }}
  storage:
    type: jbod
    volumes:
      {{- range .Values.config.kafka.storage.volumes }}
      - id: {{ .id }}
        type: {{ .type }}
        size: {{ .size }}
        {{- if .kraftMetadata }}
        kraftMetadata: {{ .kraftMetadata }}
        {{- end }}
        deleteClaim: {{ .deleteClaim }}
      {{- end }}
  template:
    pod:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              strimzi.io/cluster: {{ .Values.config.kafka.clusterName }}
              app.kubernetes.io/component: broker
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: strimzi.io/controller-name
                    operator: In
                    values:
                      - {{ .Values.config.kafka.clusterName }}-{{ .Values.config.kafka.brokerPoolName }}
              topologyKey: "kubernetes.io/hostname"
