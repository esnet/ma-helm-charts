{{- if .Values.config.chk.monitoring.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: keeper-metrics
  namespace: {{ .Values.namespace }}
  labels:
    clickhouse-keeper.altinity.com/chk: {{ .Values.config.chk.name }}
spec:
  clusterIP: None
  selector:
    clickhouse-keeper.altinity.com/chk: {{ .Values.config.chk.name }}
  ports:
    - name: metrics
      port: 7000
      targetPort: 7000
{{- end }}
---
{{- if .Values.config.ch.monitoring.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: ch-metrics
  namespace: {{ .Values.namespace }}
  labels:
    clickhouse.altinity.com/chi: {{ .Values.config.ch.installation_name }}
spec:
  clusterIP: None
  selector:
    clickhouse.altinity.com/chi: {{ .Values.config.ch.installation_name }}
  ports:
    - name: metrics
      port: 8888
      targetPort: 8888
{{- end }}
---
{{- if and .Values.config.backups.enabled .Values.config.backups.monitoring.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: ch-backups-metrics
  namespace: {{ .Values.namespace }}
  labels:
    clickhouse.altinity.com/chi: {{ .Values.config.ch.installation_name }}
spec:
  clusterIP: None
  selector:
    clickhouse.altinity.com/chi: {{ .Values.config.ch.installation_name }}
  ports:
    - name: metrics
      port: 7171
      targetPort: 7171
{{- end }}
