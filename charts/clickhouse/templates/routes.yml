{{- if and .Values.config.tls.enabled .Values.config.tls.routes }}
# TLSRoute for native ClickHouse protocol (port 9440 - Passthrough)
apiVersion: gateway.networking.k8s.io/{{ .Values.config.tls.route_api_version }}
kind: TLSRoute
metadata:
  name: clickhouse-tcp-secure
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "clickhouse.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.config.tls.gateway.name | default "external-http" }}
      sectionName: {{ .Values.config.tls.gateway.tcp_section | default "clickhouse-secure" }}
  hostnames:
{{- range $domain := .Values.config.domains }}
    - {{ $domain }}
{{- end }}
  rules:
    - backendRefs:
        - name: clickhouse-{{ .Values.config.ch.installation_name }}
          port: 9440
---
apiVersion: gateway.networking.k8s.io/{{ .Values.config.tls.route_api_version }}
kind: TLSRoute
metadata:
  name: clickhouse-https-web
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "clickhouse.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.config.tls.gateway.name | default "external-http" }}
      sectionName: {{ .Values.config.tls.gateway.https_section | default "ssl-validation" }}
  hostnames:
{{- range $domain := .Values.config.domains }}
    - {{ $domain }}
{{- end }}
  rules:
    - backendRefs:
        - name: clickhouse-{{ .Values.config.ch.installation_name }}
          port: 8443
---
{{- end }}
